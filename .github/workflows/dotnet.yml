# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Build

on:
  push:
    branches: [ "main" ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Format check
      run: dotnet format --verify-no-changes
    - name: Build
      run: dotnet build -c Release --no-restore
    - name: Test
      run: dotnet test -c Release --no-build
    - name: Upload packages artifact
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: src/VirusTotalCore*/bin/Release/*.nupkg

  publish-nuget:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Download packages artifact
      uses: actions/download-artifact@v4
      with:
        name: nuget-packages
        path: packages
    - name: NuGet login (OIDC → temp API key)
      uses: NuGet/login@v1
      id: login
      with:
        user: ${{ secrets.NUGET_USER }}
    - name: Publish NuGet to nuget.org
      run: dotnet nuget push packages/**/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

  publish-github:
    needs: ci
    runs-on: ubuntu-latest

    steps:
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Download packages artifact
      uses: actions/download-artifact@v4
      with:
        name: nuget-packages
        path: packages
    - name: Publish NuGet to GitHub
      run: dotnet nuget push packages/**/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source "https://nuget.pkg.github.com/hunterlan/index.json" --skip-duplicate