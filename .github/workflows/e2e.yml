name: E2E tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'  # nightly at 03:00 UTC

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for recent push to main and CI success
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "has_push=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          COUNT=$(git log origin/main --since="24 hours ago" --oneline | wc -l)
          if [ "$COUNT" -eq 0 ]; then
            echo "has_push=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          CONCLUSION=$(gh api repos/${{ github.repository }}/actions/workflows/dotnet.yml/runs \
            --jq '.workflow_runs | map(select(.head_branch=="main")) | first | .conclusion')
          if [ "$CONCLUSION" = "success" ]; then
            echo "has_push=true" >> $GITHUB_OUTPUT
          else
            echo "has_push=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup .NET
        if: steps.check.outputs.has_push == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        if: steps.check.outputs.has_push == 'true'
        run: dotnet restore

      - name: Build
        if: steps.check.outputs.has_push == 'true'
        run: dotnet build -c Release --no-restore

      - name: E2E tests
        if: steps.check.outputs.has_push == 'true'
        env:
          apiKey: ${{ secrets.APIKEY }}
        run: dotnet test tests/VirusTotalCore.Tests.EndToEnd -c Release --no-build
